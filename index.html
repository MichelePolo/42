<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Albero delle alternative — filosofia e scienza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,600;9..144,900&family=Spectral:wght@200;300;400;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0A1024;
  --panel:#101A3A;
  --panel2:#16224C;
  --rule:#25356E;
  --rule-soft:#1A2650;
  --text:#E6EAF8;
  --dim:#8F9CC7;
  --dimmer:#5F6C99;
  --gold:#E8B44A;
  --teal:#4FCDBE;
  --violet:#A98BEE;
  --rose:#EE7C93;
  --sky:#6FAEF2;
  --maxw:1400px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--void);
  color:var(--text);
  font-family:"Spectral",Georgia,serif;
  font-weight:300;
  font-size:16.5px;
  line-height:1.62;
  -webkit-font-smoothing:antialiased;
  background-image:
    radial-gradient(1100px 620px at 78% -12%, rgba(169,139,238,.13), transparent 62%),
    radial-gradient(900px 520px at 4% 6%, rgba(79,205,190,.08), transparent 60%);
  background-attachment:fixed;
}
.mono{font-family:"IBM Plex Mono",ui-monospace,monospace}
h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:600;line-height:1.12;margin:0}
a{color:inherit}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:3px}

/* ─────────── header ─────────── */
header{
  position:sticky;top:0;z-index:60;
  background:rgba(10,16,36,.93);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--rule-soft);
}
.hbar{
  max-width:var(--maxw);margin:0 auto;
  padding:13px 22px;
  display:flex;align-items:center;gap:20px;flex-wrap:wrap;
}
.brand{display:flex;align-items:baseline;gap:11px;margin-right:auto}
.brand b{font-family:"Fraunces";font-weight:900;font-size:19px;letter-spacing:-.02em}
.brand span{font-size:10.5px;letter-spacing:.19em;text-transform:uppercase;color:var(--dimmer)}

/* vettore w — elemento firma */
.vector{display:flex;align-items:center;gap:5px}
.vector .paren{color:var(--dimmer);font-size:19px;font-family:"IBM Plex Mono"}
.coord{
  position:relative;width:34px;height:34px;border-radius:9px;
  border:1px solid var(--rule);background:var(--panel);
  font-family:"IBM Plex Mono";font-size:13px;font-weight:600;
  color:var(--dimmer);display:grid;place-items:center;
  transition:.28s cubic-bezier(.4,0,.2,1);
}
.coord .fill{
  position:absolute;left:0;right:0;bottom:0;border-radius:0 0 8px 8px;
  background:linear-gradient(180deg,rgba(232,180,74,.55),rgba(232,180,74,.2));
  height:0;transition:height .45s cubic-bezier(.4,0,.2,1);
}
.coord i{position:relative;font-style:normal;z-index:2}
.coord[data-on="1"]{color:var(--text);border-color:rgba(232,180,74,.5)}
.coord[data-full="1"]{border-color:var(--gold);box-shadow:0 0 0 1px rgba(232,180,74,.25)}
.coord:hover{transform:translateY(-2px)}
.coord .tip{
  position:absolute;top:calc(100% + 9px);left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--rule);border-radius:7px;
  padding:5px 9px;font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.05em;
  color:var(--dim);white-space:nowrap;opacity:0;pointer-events:none;transition:.18s;z-index:70;
}
.coord:hover .tip{opacity:1}

.tabs{display:flex;gap:2px;background:var(--panel);border:1px solid var(--rule-soft);border-radius:10px;padding:3px}
.tabs button{
  padding:6px 15px;border-radius:7px;font-family:"IBM Plex Mono";font-size:11px;
  letter-spacing:.11em;text-transform:uppercase;color:var(--dimmer);transition:.2s;
}
.tabs button:hover{color:var(--text)}
.tabs button[aria-selected="true"]{background:var(--panel2);color:var(--gold);box-shadow:inset 0 0 0 1px var(--rule)}

/* ─────────── layout ─────────── */
.shell{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:294px 1fr;gap:0;align-items:start}
nav{
  position:sticky;top:61px;height:calc(100vh - 61px);overflow-y:auto;
  border-right:1px solid var(--rule-soft);padding:22px 12px 60px;
  scrollbar-width:thin;scrollbar-color:var(--rule) transparent;
}
nav::-webkit-scrollbar{width:7px}
nav::-webkit-scrollbar-thumb{background:var(--rule);border-radius:4px}
.search{
  width:100%;background:var(--panel);border:1px solid var(--rule-soft);border-radius:9px;
  padding:9px 12px;color:var(--text);font-family:"IBM Plex Mono";font-size:12.5px;margin-bottom:18px;
}
.search::placeholder{color:var(--dimmer)}
.search:focus{outline:none;border-color:var(--gold)}

.grp{margin-bottom:20px}
.grp-h{display:flex;align-items:center;gap:9px;padding:0 10px 7px}
.sym{
  width:22px;height:22px;border-radius:6px;display:grid;place-items:center;flex:none;
  font-family:"IBM Plex Mono";font-size:11px;font-weight:600;
  background:var(--panel2);border:1px solid var(--rule);color:var(--gold);
}
.grp-h em{font-style:normal;font-family:"Fraunces";font-weight:600;font-size:14px}
.grp-h small{margin-left:auto;font-family:"IBM Plex Mono";font-size:10px;color:var(--dimmer)}
.qlink{
  display:flex;gap:10px;width:100%;text-align:left;padding:6px 10px;border-radius:8px;
  color:var(--dim);font-size:14px;line-height:1.35;transition:.16s;align-items:baseline;
}
.qlink:hover{background:var(--panel);color:var(--text)}
.qlink[aria-current="true"]{background:var(--panel2);color:var(--text);box-shadow:inset 2px 0 0 var(--gold)}
.qlink .num{font-family:"IBM Plex Mono";font-size:10.5px;color:var(--dimmer);flex:none;width:19px;padding-top:2px}
.qlink[aria-current="true"] .num{color:var(--gold)}
.qlink .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex:none;align-self:center;margin-left:auto;opacity:0}
.qlink[data-answered="1"] .dot{opacity:1}

main{padding:34px 40px 110px;min-width:0}

/* ─────────── vista albero ─────────── */
.eyebrow{
  font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--dimmer);display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;
}
.eyebrow b{color:var(--gold);font-weight:500}
.eyebrow .sep{width:22px;height:1px;background:var(--rule)}
.qhead{display:flex;gap:22px;align-items:flex-start;margin-bottom:8px}
.qnum{
  font-family:"Fraunces";font-weight:300;font-size:58px;line-height:.82;
  color:transparent;-webkit-text-stroke:1px var(--rule);flex:none;padding-top:4px;
}
.qtitle{font-size:clamp(27px,3.4vw,42px);letter-spacing:-.022em;max-width:20ch}
.formula{
  font-family:"IBM Plex Mono";font-size:13.5px;color:var(--teal);
  background:linear-gradient(90deg,rgba(79,205,190,.09),transparent 80%);
  border-left:2px solid rgba(79,205,190,.45);
  padding:9px 15px;border-radius:0 8px 8px 0;margin:18px 0 6px;
  overflow-x:auto;white-space:nowrap;
}
.qnote{color:var(--dim);max-width:66ch;margin:14px 0 30px;font-size:16px}

/* specchietto discorsivo */
.guide{
  border:1px solid var(--rule-soft);border-left:2px solid var(--violet);
  border-radius:0 13px 13px 0;
  background:linear-gradient(96deg,rgba(169,139,238,.085),rgba(16,26,58,0) 72%);
  padding:17px 22px 18px;margin:0 0 28px;max-width:78ch;
}
.guide .gl{
  font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--violet);display:block;margin-bottom:8px;
}
.guide p{margin:0;font-size:16px;color:#C6CFEA}
.guide .an{
  margin-top:13px;padding-top:12px;border-top:1px solid rgba(169,139,238,.18);
  display:grid;grid-template-columns:66px 1fr;gap:14px;align-items:baseline;
}
.guide .an b{
  font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--dimmer);font-weight:500;
}
.guide .an i{font-style:italic;color:var(--dim);font-size:15.5px}

/* conseguenze di ogni ramo */
.b-imp{margin-top:14px;padding-top:12px;border-top:1px dashed var(--rule-soft);display:grid;gap:7px}
.b-imp div{display:grid;grid-template-columns:60px 1fr;gap:13px;align-items:baseline;font-size:14.5px;color:var(--dim)}
.b-imp b{
  font-family:"IBM Plex Mono";font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;
  font-weight:500;color:var(--dimmer);
}
.b-imp .im b{color:color-mix(in srgb,var(--bc) 72%,var(--dimmer))}
@media(max-width:620px){
  .b-imp div,.guide .an{grid-template-columns:1fr;gap:2px}
}

.branches{display:grid;gap:14px}
.branch{
  position:relative;border:1px solid var(--rule-soft);border-radius:14px;
  background:linear-gradient(180deg,rgba(22,34,76,.55),rgba(16,26,58,.35));
  padding:19px 22px 19px 26px;transition:.28s cubic-bezier(.4,0,.2,1);
  overflow:hidden;
}
.branch::before{
  content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;
  background:var(--bc);opacity:.55;transition:.28s;
}
.branch:hover{border-color:var(--rule);transform:translateX(3px)}
.branch:hover::before{opacity:1;top:6px;bottom:6px}
.branch[data-picked="1"]{
  border-color:var(--bc);
  background:linear-gradient(180deg,color-mix(in srgb,var(--bc) 11%,transparent),rgba(16,26,58,.4));
}
.branch[data-picked="1"]::before{opacity:1;top:0;bottom:0;width:4px;border-radius:0}
.branches[data-any="1"] .branch:not([data-picked="1"]){opacity:.44}
.branches[data-any="1"] .branch:not([data-picked="1"]):hover{opacity:.85}

.b-top{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.b-key{
  font-family:"IBM Plex Mono";font-size:10.5px;font-weight:600;letter-spacing:.1em;
  color:var(--bc);border:1px solid color-mix(in srgb,var(--bc) 40%,transparent);
  border-radius:5px;padding:2px 7px;flex:none;
}
.b-label{font-family:"Fraunces";font-weight:600;font-size:19.5px;letter-spacing:-.012em}
.b-pick{
  margin-left:auto;font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.13em;
  text-transform:uppercase;color:var(--dimmer);border:1px solid var(--rule);
  border-radius:20px;padding:4px 12px;transition:.2s;flex:none;
}
.b-pick:hover{border-color:var(--bc);color:var(--bc)}
.branch[data-picked="1"] .b-pick{background:var(--bc);border-color:var(--bc);color:var(--void);font-weight:600}
.b-f{font-family:"IBM Plex Mono";font-size:12.5px;color:var(--dim);margin:0 0 9px;overflow-x:auto}
.b-body{color:var(--dim);font-size:15.5px;max-width:72ch;margin:0}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.chip{
  font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.03em;color:var(--dim);
  background:rgba(37,53,110,.4);border:1px solid var(--rule-soft);border-radius:20px;padding:3px 10px;
}

.pager{display:flex;gap:10px;margin-top:38px;padding-top:22px;border-top:1px solid var(--rule-soft)}
.pager button{
  flex:1;text-align:left;padding:14px 18px;border:1px solid var(--rule-soft);border-radius:12px;
  transition:.2s;color:var(--dim);min-width:0;
}
.pager button:hover:not(:disabled){border-color:var(--gold);color:var(--text);background:var(--panel)}
.pager button:disabled{opacity:.3;cursor:default}
.pager button.nx{text-align:right}
.pager small{display:block;font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dimmer);margin-bottom:3px}
.pager span{font-family:"Fraunces";font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ─────────── affinità ─────────── */
.aff{margin-top:44px;border-top:1px solid var(--rule-soft);padding-top:26px}
.aff-h{display:flex;align-items:baseline;gap:14px;margin-bottom:6px;flex-wrap:wrap}
.aff-h h2{font-size:21px}
.aff-h button{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--dimmer);margin-left:auto}
.aff-h button:hover{color:var(--rose)}
.aff p{color:var(--dimmer);font-size:14px;max-width:70ch;margin:0 0 20px}
.bars{display:grid;gap:9px}
.bar{display:grid;grid-template-columns:152px 1fr 62px;gap:14px;align-items:center}
.bar-n{font-family:"Fraunces";font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-t{height:8px;border-radius:5px;background:var(--panel);overflow:hidden;border:1px solid var(--rule-soft)}
.bar-f{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--teal),var(--gold));width:0;transition:width .6s cubic-bezier(.4,0,.2,1)}
.bar-v{font-family:"IBM Plex Mono";font-size:12px;color:var(--dim);text-align:right}

/* ─────────── matrice ─────────── */
.wrap-t{overflow-x:auto;border:1px solid var(--rule-soft);border-radius:14px}
table{border-collapse:collapse;width:100%;min-width:760px;font-size:14.5px}
th,td{padding:12px 15px;text-align:left;border-bottom:1px solid var(--rule-soft);vertical-align:top}
thead th{
  font-family:"IBM Plex Mono";font-size:10px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--dimmer);font-weight:500;background:var(--panel);position:sticky;top:0;
}
tbody tr:hover{background:rgba(22,34,76,.4)}
tbody tr:last-child td{border-bottom:none}
td.q{color:var(--text);cursor:pointer}
td.q:hover{color:var(--gold)}
.cell{display:inline-block;padding:3px 10px;border-radius:20px;border:1px solid transparent;color:var(--dim);font-size:13.5px}
.cell[data-on="1"]{border-color:var(--cc);color:var(--text);background:color-mix(in srgb,var(--cc) 14%,transparent)}

/* ─────────── profili ─────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px}
.card{border:1px solid var(--rule-soft);border-radius:14px;padding:21px;background:linear-gradient(180deg,rgba(22,34,76,.5),rgba(16,26,58,.3));transition:.25s}
.card:hover{border-color:var(--rule);transform:translateY(-2px)}
.card h3{font-size:22px;margin-bottom:3px;letter-spacing:-.02em}
.card .era{font-family:"IBM Plex Mono";font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dimmer);margin-bottom:14px}
.card ul{list-style:none;margin:0;padding:0;display:grid;gap:6px}
.card li{display:grid;grid-template-columns:14px 1fr;gap:9px;font-size:14px;color:var(--dim);align-items:baseline}
.card li b{color:var(--gold);font-family:"IBM Plex Mono";font-size:10px;font-weight:500}
.card .mt{margin-top:15px;padding-top:13px;border-top:1px solid var(--rule-soft);font-family:"IBM Plex Mono";font-size:11px;color:var(--dimmer);display:flex;justify-content:space-between}
.card .mt em{font-style:normal;color:var(--teal)}

.lead{max-width:74ch;color:var(--dim);margin:0 0 28px}
.lead strong{color:var(--text);font-weight:400}
h2.vh{font-size:32px;letter-spacing:-.02em;margin-bottom:6px}

.navtoggle{display:none}
@media(max-width:940px){
  .shell{grid-template-columns:1fr}
  nav{position:fixed;left:0;top:0;height:100vh;width:290px;background:var(--void);z-index:80;transform:translateX(-100%);transition:.3s;border-right:1px solid var(--rule);padding-top:70px}
  nav[data-open="1"]{transform:none;box-shadow:30px 0 70px rgba(0,0,0,.6)}
  .navtoggle{display:grid;place-items:center;width:36px;height:36px;border:1px solid var(--rule);border-radius:9px;color:var(--dim)}
  main{padding:26px 20px 90px}
  .vector{order:5;width:100%;justify-content:center;padding-top:4px}
  .brand{margin-right:0}
  .hbar{gap:12px}
  .qnum{display:none}
  .bar{grid-template-columns:110px 1fr 50px}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <button class="navtoggle" id="ntg" aria-label="Apri indice">☰</button>
    <div class="brand">
      <b>Albero delle alternative</b>
      <span>filosofia · scienza</span>
    </div>
    <div class="vector" id="vec" title="w = (d, r, m, v, c, u, k, e, s)">
      <span class="paren mono">⟨</span>
      <span class="paren mono">⟩</span>
    </div>
    <div class="tabs" role="tablist">
      <button role="tab" data-view="tree" aria-selected="true">Albero</button>
      <button role="tab" data-view="matrix" aria-selected="false">Matrice</button>
      <button role="tab" data-view="profiles" aria-selected="false">Profili</button>
    </div>
  </div>
</header>

<div class="shell">
  <nav id="nav">
    <input class="search" id="search" placeholder="cerca una domanda…" aria-label="Cerca una domanda">
    <div id="navlist"></div>
  </nav>
  <main id="main"></main>
</div>

<script>
/* ══════════ modello: 9 coordinate del vettore w ══════════ */
const CLUSTERS = [
  {id:"d", name:"Il divino",        gloss:"esiste un principio assoluto?"},
  {id:"r", name:"La realtà",        gloss:"che cosa c'è, e da che cosa dipende"},
  {id:"m", name:"Il cosmo",         gloss:"origine, fine, legge, caso"},
  {id:"v", name:"La vita",          gloss:"il vivente è materia organizzata?"},
  {id:"c", name:"La coscienza",     gloss:"mente, anima, io"},
  {id:"u", name:"L'uomo",           gloss:"libertà, ragione, natura"},
  {id:"k", name:"La conoscenza",    gloss:"verità, metodo, significato"},
  {id:"e", name:"L'etica",          gloss:"il bene e l'azione giusta"},
  {id:"s", name:"Società e storia", gloss:"stato, direzione, natura"}
];

const HUE = ["--gold","--teal","--violet","--rose","--sky"];

/* ══════════ le 37 domande ══════════ */
const Q = [
{id:"q1", c:"d", t:"Esiste una realtà divina?", f:"𝒲 = 𝒟⁺ ∪ 𝒟⁻ ∪ 𝒟ˀ",
 note:"La prima biforcazione. Alle due alternative A e ¬A va aggiunta una terza uscita: non sappiamo, non possiamo sapere, oppure la domanda è mal posta.",
 g:"Non è una domanda su un oggetto in più nell'inventario del mondo: è una domanda su che tipo di spiegazione accetti come ultima. Chi risponde sì colloca il fondamento fuori dalla serie delle cause naturali; chi risponde no chiude la serie su se stessa; chi sceglie la terza uscita sostiene che manchi ancora un criterio per decidere. Prima di scegliere, chiediti quale delle tre ti costerebbe di più abbandonare: quello è il tuo impegno reale.",
 an:"È la differenza fra un sistema con un punto di ingresso esterno e uno che si autoavvia. Non cambia una singola funzione: cambia dove smetti di risalire lo stack.",
 o:[
  {id:"a", l:"Teismo", f:"𝒟⁺ = { esiste Dio, il divino o un principio assoluto }", b:"Esiste una realtà divina, personale o impersonale, distinta o coincidente con il mondo.", ex:["ebraismo","cristianesimo","islam","deismo","neoplatonismo","Vedānta"],
   im:"Che il mondo non basti a spiegare se stesso.", co:"Devi dire come una realtà fuori dal mondo agisca dentro il mondo, e perché fermarsi proprio lì."},
  {id:"b", l:"Ateismo", f:"𝒟⁻ : ¬∃D", b:"Non esiste alcuna realtà divina o soprannaturale. Tutto ciò che esiste appartiene alla natura.", ex:["naturalismo","materialismo","umanesimo secolare"],
   im:"Che ogni spiegazione resti interna alla natura.", co:"Resta aperto perché ci sia qualcosa invece di nulla, e perché proprio queste leggi."},
  {id:"c", l:"Agnosticismo e non-teismo", f:"𝒟ˀ = { non sappiamo · non possiamo sapere · domanda da chiarire }", b:"Il giudizio resta sospeso, oppure il divino non è la categoria centrale della visione del mondo.", ex:["agnosticismo","ignosticismo","buddhismo","taoismo"],
   im:"A distinguere fra ciò che non sai e ciò che non è sapibile.", co:"Sospendere il giudizio ha un costo pratico: la vita chiede comunque di orientarsi."}
 ]},
{id:"q2", c:"d", t:"Il divino è uno o molteplice?", f:"𝒟⁺ → 𝒟₁ | 𝒟ₙ",
 note:"La divisione fra uno e molti non è netta come sembra: molte tradizioni politeiste leggono gli dèi come aspetti di una realtà superiore.",
 g:"La posta non è aritmetica ma esplicativa. Un principio unico dà unità e ordine, e poi deve giustificare il male e la varietà del mondo; molti principi spiegano bene conflitto e pluralità, e rinunciano a un fondamento ultimo. La terza via è storicamente la più diffusa: molti nomi, una sola sorgente.",
 an:"Monolite contro microservizi. L'uno è più coerente e più difficile da far tornare con l'esperienza; i molti sono più aderenti ai fenomeni e più difficili da unificare.",
 o:[
  {id:"a", l:"Un solo principio", f:"𝒟₁ = { monoteismo o principio unitario }", b:"Un unico Dio o un unico assoluto da cui tutto dipende.", ex:["ebraismo","cristianesimo","islam","l'Uno neoplatonico","Vedānta non dualista"],
   im:"Una sola fonte di senso e di norma.", co:"Il problema del male diventa acuto: c'è un solo responsabile."},
  {id:"b", l:"Molti dèi", f:"𝒟ₙ = { politeismo }", b:"Una pluralità di potenze divine, ciascuna con dominio, storia e culto propri.", ex:["religione greca e romana","Egitto","Mesopotamia","religioni indigene"],
   im:"Domini distinti, ciascuno con la sua logica.", co:"Manca un criterio ultimo quando gli dèi confliggono fra loro."},
  {id:"c", l:"Unità con molte manifestazioni", f:"𝒟ₙ ⊂ 𝒟₁", b:"Gli dèi sono manifestazioni, potenze, funzioni cosmiche o aspetti di una sola realtà.", ex:["alcune tradizioni induiste","enoteismo"],
   im:"Che i nomi divini siano interfacce di una stessa realtà.", co:"Rischia di rendere puramente nominale la distinzione fra le divinità."}
 ]},
{id:"q3", c:"d", t:"Il divino è personale o impersonale?", f:"𝒟⁺ → 𝒟ₚ | 𝒟ᵢ",
 note:"",
 g:"Qui si decide se il fondamento può essere interpellato. Un Dio personale rende possibili preghiera, alleanza, perdono e giudizio; un principio impersonale rende possibili contemplazione e conoscenza, non dialogo. Molte discussioni fra credenti e non credenti si chiariscono appena si stabilisce quale dei due si sta affermando o negando.",
 an:"Un'interfaccia con cui puoi negoziare, oppure una costante fisica. Puoi studiare entrambe; solo con la prima ha senso trattare.",
 o:[
  {id:"a", l:"Dio personale", f:"𝒟ₚ = { Dio conosce, vuole, ama, giudica, agisce }", b:"Il divino è un soggetto dotato di volontà e intenzione, con cui è possibile una relazione.", ex:["teismo ebraico","cristiano","islamico","induismo devozionale"],
   im:"Una relazione possibile, e quindi anche il rischio del rifiuto.", co:"Antropomorfismo: attribuisci al fondamento categorie ricavate da noi."},
  {id:"b", l:"Principio impersonale", f:"𝒟ᵢ = { ordine, unità, legge, assoluto }", b:"Il divino non è un io: è fondamento, struttura o assoluto senza intenzione.", ex:["l'Uno","Brahman","Dao","Spirito assoluto","Natura"],
   im:"Un assoluto che non ha intenzioni verso di te.", co:"Difficile fondarci una vita religiosa fatta di richiesta e risposta."}
 ]},
{id:"q4", c:"d", t:"Il divino coincide con il mondo?", f:"D = W  |  D ≠ W  |  W ⊂ D",
 note:"Tre modi di collocare il confine fra il divino e il reale osservabile.",
 g:"È la domanda sul confine. Se Dio e mondo coincidono, la natura è già tutto il sacro e il miracolo perde significato; se sono distinti, resta il problema del contatto; il panenteismo tiene insieme entrambe le esigenze e paga in precisione. Nota che la risposta qui vincola quelle su intervento e creazione: conviene tornarci dopo averle lette.",
 an:"Contenitore, contenuto, oppure contenuto che eccede il contenitore. Tre relazioni di appartenenza diverse, con conseguenze diverse su che cosa può accadere dentro.",
 o:[
  {id:"a", l:"Panteismo", f:"D = W", b:"Natura e divino sono due modi di indicare la stessa realtà.", ex:["Spinoza — Deus sive Natura"],
   im:"Che la natura sia l'unica cosa che c'è, e sia divina.", co:"Difficile distinguerlo da un ateismo con vocabolario religioso."},
  {id:"b", l:"Teismo trascendente", f:"D ≠ W", b:"Dio crea o fonda il mondo ma non coincide con esso.", ex:["teismo classico"],
   im:"Una differenza radicale fra creatore e creatura.", co:"Come fa il totalmente altro a toccare il mondo senza diventarne parte?"},
  {id:"c", l:"Panenteismo", f:"W ⊂ D", b:"Il mondo partecipa alla realtà divina ma non la esaurisce.", ex:["teologia del processo","alcune mistiche"],
   im:"Che il mondo sia reale in Dio senza esaurirlo.", co:"Il rapporto fra i due termini resta difficile da precisare."}
 ]},
{id:"q5", c:"d", t:"Il divino è percepibile?", f:"𝒟⁺ → 𝒟ₚₑᵣc | 𝒟₋ₚₑᵣc",
 note:"",
 g:"Qui si gioca il rapporto fra esperienza e trascendenza. Se il divino si manifesta, c'è qualcosa da testimoniare e su cui discutere pubblicamente; se non è un oggetto fra gli oggetti, ogni esperienza resta interpretazione e nessuna prova può essere decisiva. La seconda opzione protegge la posizione da ogni confutazione, e per lo stesso motivo le toglie mordente.",
 an:"Un evento osservabile contro un invariante che si può solo inferire dal comportamento complessivo del sistema.",
 o:[
  {id:"a", l:"Si manifesta", f:"D ⇝ esperienza", b:"Attraverso apparizioni, eventi, esperienze mistiche, incarnazioni, natura, simboli e rituali.", ex:["religioni rivelate","misticismo","cosmologie tradizionali"],
   im:"Che esperienze e testimonianze contino come evidenza.", co:"Le stesse esperienze ammettono spiegazioni psicologiche, neurologiche e culturali."},
  {id:"b", l:"Non è un oggetto fra gli oggetti", f:"D ∉ { oggetti dell'esperienza }", b:"Può essere inferito, creduto, intuito o contemplato, ma non descritto adeguatamente con concetti umani.", ex:["teologia negativa","apofatismo"],
   im:"Che ogni linguaggio su Dio sia inadeguato per principio.", co:"Se nulla può confermarla né smentirla, che differenza fa affermarla?"}
 ]},
{id:"q6", c:"d", t:"Dio interviene nel mondo?", f:"D → W",
 note:"",
 g:"È la domanda più esposta al confronto con la scienza. La provvidenza rende il mondo drammatico e la storia significativa, ma deve convivere con la regolarità delle leggi e con il male non impedito; il deismo salva la coerenza e paga in rilevanza religiosa. Il caso di prova non è il miracolo compiuto, è quello mancato.",
 an:"Un sistema con manutenzione continua contro uno che gira dal deploy iniziale. Il secondo è più elegante e non risponde alle richieste.",
 o:[
  {id:"a", l:"Provvidenza", f:"D → W  in ogni istante", b:"Il divino crea, conserva, giudica, compie miracoli, rivela e orienta la storia.", ex:["teismo provvidenziale"],
   im:"Che la storia abbia un interlocutore.", co:"Perché interviene qui e non là: il male resta il caso critico."},
  {id:"b", l:"Deismo", f:"D → W  solo all'origine", b:"Dio istituisce un universo ordinato da leggi e non interviene nel suo funzionamento.", ex:["deismo illuminista"],
   im:"Leggi stabili senza eccezioni.", co:"Un Dio che non fa differenza operativa è difficile da distinguere da nessun Dio."}
 ]},
{id:"q7", c:"d", t:"Come procede il mondo dal principio?", f:"𝒟⁺ → W",
 note:"",
 g:"Quattro modelli causali diversi, e ciascuno decide quanto il mondo sia contingente. La creazione introduce discontinuità e libertà; l'emanazione introduce gradi e continuità necessaria; l'ordinamento presuppone una materia già data e limita la responsabilità del principio; l'identità dissolve il problema chiudendo la distanza.",
 an:"Istanziare da zero, derivare per livelli successivi, compilare da sorgenti preesistenti, oppure riconoscere che sorgente ed eseguibile sono la stessa cosa vista in due modi.",
 o:[
  {id:"a", l:"Creazione", f:"D —atto libero→ W", b:"Il mondo dipende da un atto creatore libero.", ex:["creazionismo metafisico"],
   im:"Un atto libero, e quindi la contingenza radicale del mondo.", co:"Che cosa significa causare l'esistenza, e non solo la forma?"},
  {id:"b", l:"Emanazione", f:"D → L₁ → L₂ → W", b:"Il mondo procede dal principio assoluto attraverso livelli successivi di realtà.", ex:["Plotino"],
   im:"Una gerarchia continua di gradi di realtà.", co:"Se tutto procede necessariamente, il principio non è libero."},
  {id:"c", l:"Ordinamento demiurgico", f:"Demiurgo + materia + modelli → cosmo", b:"Il principio divino non crea dal nulla: ordina una realtà preesistente.", ex:["il Timeo di Platone"],
   im:"Un limite alla potenza del principio: la materia resiste.", co:"Da dove viene la materia preesistente?"},
  {id:"d", l:"Identità", f:"D = W", b:"Non c'è alcun atto creatore distinto, perché Dio e natura coincidono.", ex:["Spinoza"],
   im:"Nessuna origine da spiegare.", co:"Sparisce ogni distinzione fra fondamento e fondato."}
 ]},
{id:"q8", c:"d", t:"Se Dio non esiste, in che senso?", f:"𝒟⁻ →",
 note:"L'ateismo non è una posizione sola: cambia a seconda di che cosa nega e di che cosa mette al posto.",
 g:"Serve distinguerle perché vengono continuamente confuse in un unico bersaglio. La tesi metafisica afferma qualcosa sul mondo e ha oneri di prova; la regola metodologica non afferma nulla e non ne ha. Gran parte delle dispute pubbliche nasce dallo scambiare la seconda per la prima, in entrambe le direzioni.",
 an:"Affermare che un valore è null contro il non usarlo mai nel codice. Sono cose diverse: solo la prima è una tesi sul dominio.",
 o:[
  {id:"a", l:"Ateismo metafisico", f:"¬∃D", b:"Nessuna realtà divina o soprannaturale, come tesi sull'essere.", ex:[],
   im:"Una tesi ontologica positiva.", co:"Anche negare richiede argomenti, non solo assenza di prove contrarie."},
  {id:"b", l:"Naturalismo", f:"∀x ( x esiste → x ∈ natura )", b:"La realtà si spiega con materia, energia, campi, processi, leggi e relazioni naturali.", ex:[],
   im:"Che ogni ente stia dentro la natura.", co:"Che cosa conti come naturale è a sua volta da definire, e il confine si sposta."},
  {id:"c", l:"Ateismo umanistico", f:"¬D ⇒ responsabilità dell'uomo", b:"L'assenza di Dio diventa il compito umano di costruire significato, valori e società.", ex:["Feuerbach","Nietzsche","Sartre","umanesimo secolare"],
   im:"Che il significato sia interamente un compito umano.", co:"Costruire valori senza fondamento esterno è più fragile di quanto sembri sotto pressione."},
  {id:"d", l:"Ateismo metodologico", f:"spiegazione → cause naturali verificabili", b:"La scienza non afferma che Dio non esista: semplicemente non lo usa come spiegazione operativa.", ex:[],
   im:"Solo una regola di lavoro, non una visione del mondo.", co:"Nella pratica scivola facilmente in tesi metafisica senza dichiararlo."}
 ]},
{id:"q9", c:"d", t:"Che tipo di non-sapere?", f:"𝒟ˀ →",
 note:"",
 g:"Tre gradi diversi di modestia, con impegni molto diversi. Il primo lascia aperta la ricerca; il secondo la chiude per principio, ed è già una tesi forte sulla struttura della conoscenza umana; il terzo sposta il problema a monte, sulla semantica, e chiede di definire il termine prima di discuterne l'esistenza.",
 an:"Non ancora calcolato, non calcolabile, oppure query malformata. Il terzo caso non è un risultato: è un errore di sintassi.",
 o:[
  {id:"a", l:"Agnosticismo debole", f:"non sappiamo ancora", b:"La questione resta aperta, ma non è dichiarata inaccessibile in linea di principio.", ex:[],
   im:"Che nuove evidenze o argomenti possano contare.", co:"Rischia di essere una sospensione che non arriva mai a decidere."},
  {id:"b", l:"Agnosticismo forte", f:"non possiamo sapere", b:"La domanda eccede strutturalmente le capacità conoscitive umane.", ex:[],
   im:"Un limite strutturale della ragione.", co:"Come fai a sapere che non si può sapere? È già una conoscenza forte."},
  {id:"c", l:"Ignosticismo", f:"esistenza ⇒ definizione coerente dell'oggetto", b:"Prima di chiedere se Dio esista bisogna stabilire che cosa significhi la parola.", ex:[],
   im:"Che si debba prima fissare il significato del termine.", co:"Rischia di rifiutare la domanda invece di affrontarla."}
 ]},
{id:"q10", c:"d", t:"La spiritualità richiede il divino?", f:"spiritualità → con D | senza D",
 note:"non-teismo ≠ ateismo materialista",
 g:"Domanda utile per non collassare due assi indipendenti. Si può avere pratica spirituale senza Dio, fatta di disciplina, meditazione e liberazione, e teismo dichiarato senza alcuna vita spirituale. Trattare religioso e teista come sinonimi rende inintelligibile buona parte dell'Asia e diverse correnti occidentali.",
 an:"Interfaccia e implementazione: la pratica è ciò che fai, la metafisica è come la giustifichi. Non c'è mappatura uno a uno fra le due.",
 o:[
  {id:"a", l:"Sì", f:"spiritualità ⊂ 𝒟⁺", b:"L'esperienza spirituale è relazione con un principio o una persona divina.", ex:[],
   im:"Che l'esperienza spirituale sia sempre relazione con un altro.", co:"Esclude per definizione tradizioni che praticano senza credere in un Dio."},
  {id:"b", l:"No", f:"spiritualità ∩ 𝒟⁻ ≠ ∅", b:"Esistono pratiche e tradizioni spirituali non teistiche, centrate su disciplina, conoscenza o liberazione.", ex:["buddhismo","taoismo","spiritualità naturalistica","umanesimo religioso"],
   im:"Che pratica ed etica reggano senza fondamento teistico.", co:"Senza fondamento, che cosa distingue una spiritualità da una tecnica di benessere?"}
 ]},

{id:"q11", c:"r", t:"Esiste una realtà indipendente dall'osservatore?", f:"𝒲 → ℛ⁺ | ℛ⁻ | ℛˀ",
 note:"",
 g:"È la domanda che decide che cosa fa una teoria scientifica: descrive strutture reali o organizza al meglio le nostre esperienze? Attenzione a non caricare troppo l'idealismo: quello trascendentale non nega il mondo esterno, dice che il mondo conosciuto porta sempre le impronte dello strumento che lo conosce. Il realismo strutturale è il compromesso più praticato oggi in filosofia della fisica.",
 an:"Il database esiste anche quando nessuna sessione è aperta, ma tu vedi sempre e solo il risultato di una query, mai la tabella nuda. Il realista dice che le righe ci sono; l'idealista studia lo schema del client.",
 o:[
  {id:"a", l:"Realismo", f:"ℛ⁺ : il mondo esiste anche se nessuno lo osserva", b:"Ingenuo — le cose sono come appaiono. Critico — la realtà esiste ma la conosciamo tramite modelli fallibili. Scientifico — le migliori teorie descrivono strutture reali. Strutturale — conosciamo relazioni, non nature ultime.", ex:["realismo critico","realismo strutturale"],
   im:"Che l'errore sia possibile perché c'è qualcosa che ti smentisce.", co:"Non puoi mai confrontare la rappresentazione con il reale non rappresentato."},
  {id:"b", l:"Idealismo", f:"ℛ⁻ : essere = essere percepito o costituito", b:"Soggettivo in Berkeley, trascendentale in Kant (la realtà conosciuta dipende dalle strutture cognitive), assoluto in Hegel.", ex:["Berkeley","Kant","Hegel"],
   im:"Che le condizioni del conoscere siano parte dell'oggetto conosciuto.", co:"Devi spiegare la resistenza del mondo e l'accordo fra soggetti diversi."},
  {id:"c", l:"Non-dualismo", f:"X → soggetto | oggetto", b:"La separazione netta fra soggetto e oggetto è secondaria: entrambi derivano da qualcosa di più originario.", ex:["monismo neutrale","Vedānta","fenomenologia","filosofia del processo"],
   im:"Che soggetto e oggetto siano astrazioni da un campo unico.", co:"Difficile dire che cosa sia il campo neutrale senza usare i termini che volevi derivare."}
 ]},
{id:"q12", c:"r", t:"La realtà fondamentale è una o molteplice?", f:"𝒲 → 𝒪₁ | 𝒪₂ | 𝒪ₙ",
 note:"",
 g:"Criterio pratico per decidere: il monismo è più economico e paga il conto sulle differenze qualitative — come fa la materia a sentire? Il dualismo rispetta l'esperienza e paga sull'interazione — dove esattamente si toccano? Il pluralismo è il più fedele ai fenomeni e il meno unificato. Nessuna delle tre è gratis: scegli quale debito preferisci.",
 an:"Un solo tipo primitivo con tutto derivato, due tipi non convertibili, oppure molti tipi primitivi. Il primo è elegante finché non devi rappresentare qualcosa che non ci sta dentro.",
 o:[
  {id:"a", l:"Monismo", f:"𝒪₁ : W = M | C | X | I", b:"Un solo tipo di realtà fondamentale: materiale, mentale, neutrale oppure informazionale (il reale come differenze e relazioni codificabili).", ex:["materialismo","idealismo","monismo neutrale","it from bit"],
   im:"Che ogni differenza sia derivata, non fondamentale.", co:"Le qualità dell'esperienza restano difficili da ricavare dal principio unico."},
  {id:"b", l:"Dualismo", f:"𝒪₂ : W = { materia, mente }", b:"Due principi irriducibili. Oltre a mente e materia: bene e male, spirito e natura, noumeno e fenomeno, sacro e profano.", ex:["Cartesio"],
   im:"Due generi irriducibili l'uno all'altro.", co:"Il problema dell'interazione causale non ha mai ricevuto una soluzione soddisfacente."},
  {id:"c", l:"Pluralismo", f:"𝒪ₙ", b:"Molti principi o molti generi di enti fondamentali.", ex:["radici di Empedocle","semi di Anassagora","atomi di Democrito","monadi di Leibniz"],
   im:"Che il reale non sia riducibile a un principio.", co:"Rinunci al potere unificante che è il motivo per cui si fa metafisica."}
 ]},
{id:"q13", c:"r", t:"Il reale è fatto di cose o di processi?", f:"𝒮 | 𝒫",
 note:"",
 g:"Domanda apparentemente astratta, in realtà decisiva su identità personale, specie biologiche e istituzioni. Se le cose sono processi stabilizzati, l'identità diventa sempre questione di grado e di soglia, mai di essenza: e allora la nave di Teseo non è un paradosso ma la condizione normale di ogni oggetto.",
 an:"Un record con chiave primaria contro un event stream: nel secondo caso l'oggetto è solo la proiezione corrente degli eventi, e la domanda « è ancora lo stesso? » non ha risposta secca.",
 o:[
  {id:"a", l:"Sostanzialismo", f:"𝒮 : identità che permane nel cambiamento", b:"Le cose hanno un nucleo che resta mentre le proprietà mutano.", ex:["sostanze aristoteliche","res cogitans e res extensa","monadi"],
   im:"Che ci sia un portatore delle proprietà.", co:"La sostanza non si osserva mai: si postula sotto le proprietà osservate."},
  {id:"b", l:"Processualismo", f:"cosa = processo stabilizzato", b:"Le cose sono configurazioni relativamente stabili di processi: ciò che chiamiamo oggetto è un ritmo lento.", ex:["Eraclito","Bergson","Whitehead","sistemi dinamici"],
   im:"Che la stabilità sia un effetto, non un dato di partenza.", co:"Se tutto scorre, perché parliamo con tanto successo di cose che restano?"},
  {id:"c", l:"Relazioni ed eventi", f:"ente = nodo in una rete di relazioni", b:"Ciò che è fondamentale non sono né cose né flussi, ma eventi e le loro relazioni.", ex:["ontologie relazionali"],
   im:"Che i termini siano meno fondamentali della relazione.", co:"Relazioni fra che cosa, se non c'è nulla di relazionato?"}
 ]},

{id:"q14", c:"m", t:"Il mondo ha un inizio?", f:"𝒲 → inizio | eterno | ciclo | ?",
 note:"La cosmologia descrive l'evoluzione dell'universo osservabile da uno stato molto caldo e denso, ma non risolve automaticamente la domanda metafisica sull'origine assoluta.",
 g:"Tieni separati due piani, o la discussione si impantana: la cosmologia descrive lo stato iniziale dell'universo osservabile, la metafisica chiede perché ci sia un universo. La quarta opzione non è un'evasione: se il tempo nasce con il mondo, chiedere che cosa ci fosse prima è come chiedere che cosa ci sia a nord del polo nord.",
 an:"L'istante zero di un sistema non ha un timestamp precedente perché il clock parte lì. L'assenza di dati prima di t₀ non è un dato mancante.",
 o:[
  {id:"a", l:"Ha un inizio", f:"∃ t₀", b:"Creazione, origine cosmologica, emergenza del tempo insieme all'universo, evento iniziale fisico.", ex:[],
   im:"Un fatto ultimo da spiegare oppure da accettare come bruto.", co:"Perché quell'inizio, e in che senso c'era un « poi » se non c'era un prima?"},
  {id:"b", l:"È eterno", f:"∄ primo istante", b:"Nessun primo momento: il mondo è sempre stato.", ex:["Aristotele","cosmologie materialiste"],
   im:"Nessuna origine, quindi nessun creatore necessario.", co:"Una serie infinita già percorsa è concettualmente ostica e mal si accorda con la cosmologia osservata."},
  {id:"c", l:"È ciclico", f:"W₁ → W₂ → … → Wₙ → W₁", b:"Nascita, dissoluzione e ricominciamento come struttura del tempo cosmico.", ex:["cosmologie indiane","eterno ritorno stoico"],
   im:"Ripetizione senza destinazione.", co:"L'evidenza empirica per i cicli cosmici resta debole."},
  {id:"d", l:"Non decidibile", f:"tempo ⊂ universo ⇒ « prima » mal definito", b:"Se il tempo è interno all'universo, chiedere che cosa vi fosse prima può essere una domanda malformata.", ex:[],
   im:"Che alcune domande siano difettose, non solo difficili.", co:"È comodo: rischia di far passare per non-domanda ciò che è soltanto arduo."}
 ]},
{id:"q15", c:"m", t:"Il mondo ha un fine?", f:"W → F   ∨   W ↛ F",
 note:"",
 g:"Distingui finalità e regolarità, o sbagli bersaglio. Un sistema può essere orientato a uno scopo senza che nessuno lo abbia inteso: la selezione naturale produce organi che sembrano progettati e non lo sono. La terza opzione è quella che la biologia usa di fatto ogni giorno: teleonomia locale senza teleologia cosmica.",
 an:"La differenza fra codice scritto per uno scopo e codice emerso da ottimizzazione automatica: funzionalmente indistinguibili, con storie causali opposte.",
 o:[
  {id:"a", l:"Teleologia", f:"W → F", b:"Il mondo è orientato verso un fine: progetto divino, finalità naturale, sviluppo dello Spirito, progresso, ordine cosmico.", ex:["Aristotele","teologie provvidenziali","Hegel","Teilhard de Chardin"],
   im:"Che gli eventi vadano letti anche per il loro verso.", co:"Le finalità apparenti si spiegano bene senza alcuna intenzione."},
  {id:"b", l:"Non-teleologia", f:"W ↛ F", b:"Gli eventi derivano da cause, necessità, probabilità, selezione naturale, contingenza e interazione di processi.", ex:["atomismo","naturalismo","darwinismo","esistenzialismo ateo"],
   im:"Solo cause efficienti, dal passato verso il futuro.", co:"Il linguaggio funzionale resta irrinunciabile in biologia e in medicina."},
  {id:"c", l:"Finalità locali", f:"¬F(W) ∧ ∃F(x)", b:"Nessun fine complessivo, ma comportamenti orientati a scopo in organismi, sistemi e agenti.", ex:["teleonomia"],
   im:"Scopi reali, ma locali e generati dalla storia del sistema.", co:"Dove finisce il locale e comincerebbe il cosmico? Il confine è da argomentare."}
 ]},
{id:"q16", c:"m", t:"Le leggi di natura sono necessarie?", f:"leggi →",
 note:"",
 g:"Domanda su che cosa sia una legge, prima ancora che su quali leggi valgano. Se le leggi governano, sono entità reali e spiegano; se descrivono, non spiegano nulla, riassumono. La scelta cambia il valore probatorio che la fisica può avere in qualunque discussione metafisica: è il presupposto nascosto di metà delle dispute su scienza e filosofia.",
 an:"Vincoli di integrità imposti dal motore, oppure statistiche raccolte sui dati esistenti. Nel primo caso una violazione è impossibile; nel secondo è solo mai avvenuta finora.",
 o:[
  {id:"a", l:"Necessarie", f:"□ L", b:"Non potrebbero essere diverse da come sono.", ex:[],
   im:"Che l'universo non potesse essere altrimenti.", co:"Perché proprio queste, allora? La necessità è più facile da affermare che da mostrare."},
  {id:"b", l:"Contingenti", f:"◇ ¬L", b:"Sono le leggi di questo universo, ma avrebbero potuto essere altre.", ex:[],
   im:"Che questo sia un universo fra i possibili.", co:"Apre subito la domanda su che cosa selezioni la configurazione osservata."},
  {id:"c", l:"Descrittive", f:"L = riassunto di regolarità", b:"Non governano nulla: registrano ciò che accade regolarmente.", ex:[],
   im:"Nessun potere causale nelle leggi.", co:"Se non governano, perché la natura è così affidabile e prevedibile?"},
  {id:"d", l:"Costruite nei modelli", f:"L ∈ apparato teorico", b:"Sono strumenti con cui organizziamo l'esperienza, non entità del mondo.", ex:[],
   im:"Che le leggi appartengano ai modelli, non al mondo.", co:"Difficile spiegare perché modelli costruiti da noi predicano così bene."}
 ]},
{id:"q17", c:"m", t:"Tutto è determinato?", f:"stato + leggi ⇒ futuro",
 note:"",
 g:"Non confondere questa con la domanda sulla libertà, che è la 25: qui si parla soltanto di quanti futuri siano compatibili con lo stato presente. E la risposta può legittimamente cambiare a livelli diversi — microfisico, biologico, sociale — senza contraddizione, purché tu dica quale livello stai descrivendo.",
 an:"Funzione pura contro funzione che consulta una sorgente di entropia. Il determinismo afferma che l'universo è idempotente: stesso input, stesso output, sempre.",
 o:[
  {id:"a", l:"Determinismo", f:"stato presente + leggi ⇒ un solo futuro", b:"Nelle forme fisica, biologica, psicologica, economica o teologica.", ex:["Laplace","Spinoza"],
   im:"Che l'imprevedibilità sia solo epistemica.", co:"La meccanica quantistica ammette letture indeterministe, e i sistemi caotici rendono la predizione impraticabile in linea di fatto."},
  {id:"b", l:"Indeterminismo", f:"stato presente ⇒ più futuri possibili", b:"Il caso o la probabilità appartengono realmente al mondo, non solo alla nostra ignoranza.", ex:[],
   im:"Che il caso sia una struttura del mondo, non un limite nostro.", co:"Il caso non aiuta la libertà: un'azione casuale non è più tua di una necessitata."},
  {id:"c", l:"Modelli misti", f:"vincoli + contingenza + auto-organizzazione", b:"Alcuni livelli sono deterministici, altri probabilistici: la descrizione dipende dalla scala.", ex:["sistemi complessi"],
   im:"Che la risposta dipenda dal livello di descrizione.", co:"Rischia di rimandare la domanda invece di rispondere: quale livello è quello vero?"}
 ]},
{id:"q18", c:"m", t:"Esiste il caso?", f:"caso → reale | apparente",
 note:"",
 g:"È il test di coerenza della risposta precedente. Chiamare caso l'ignoranza delle cause è legittimo e utilissimo in statistica; sostenere che esistano eventi oggettivamente non determinati è una tesi molto più impegnativa, e va sostenuta con la fisica, non con l'intuizione o con il senso comune.",
 an:"Pseudocasuale contro casuale hardware: il primo è del tutto deterministico e sembra casuale solo perché non conosci il seme.",
 o:[
  {id:"a", l:"Caso reale", f:"∃ eventi non determinati", b:"Alcuni eventi non sono completamente fissati dalle condizioni precedenti.", ex:[],
   im:"Un mondo in cui il passato non fissa il futuro.", co:"Devi mostrare che l'indeterminazione è nel mondo e non nel modello: non è ancora deciso."},
  {id:"b", l:"Caso apparente", f:"caso = causa non conosciuta", b:"Il caso è un nome per la nostra ignoranza delle cause.", ex:[],
   im:"Che ogni evento abbia cause, note o ignote.", co:"Non è dimostrabile: è una scommessa metodologica sul futuro della ricerca."}
 ]},

{id:"q19", c:"v", t:"La vita è riducibile alla materia?", f:"vita → ?",
 note:"",
 g:"Il vitalismo storico è stato smentito nei dettagli, ma la domanda vera non è sparita. Non è « serve una forza in più? », è « la spiegazione delle parti basta a spiegare l'organizzazione? ». Organicismo e autopoiesi rispondono di no senza aggiungere nulla di misterioso: spostano il livello esplicativo, non la sostanza.",
 an:"Conoscere ogni funzione di un sistema non ti dà l'architettura. La riduzione al modulo è vera e insufficiente: manca il livello in cui il sistema mantiene se stesso.",
 o:[
  {id:"a", l:"Meccanicismo", f:"vita = materia organizzata", b:"Il vivente si spiega con chimica, metabolismo, genetica, regolazione, evoluzione e interazioni molecolari.", ex:[],
   im:"Nessun confine di principio fra vivente e non vivente.", co:"L'organizzazione resta da spiegare, non solo da elencare componente per componente."},
  {id:"b", l:"Vitalismo", f:"vita = materia + principio vitale", b:"Il vivente possiede una forza irriducibile alla fisica.", ex:["Driesch","élan vital"],
   im:"Qualcosa di irriducibile nel vivente.", co:"Nessun candidato empirico ha retto: la biochimica ha spiegato ciò che il vitalismo dichiarava impossibile."},
  {id:"c", l:"Organicismo", f:"organismo > Σ componenti", b:"Organizzazione e totalità sono essenziali: la vita non si riduce alle parti prese separatamente.", ex:[],
   im:"Che il livello del tutto abbia potere esplicativo.", co:"Rischia di restare descrittivo se non specifica come il tutto agisca sulle parti."},
  {id:"d", l:"Autopoiesi", f:"vivente = sistema che produce e mantiene se stesso", b:"Ciò che definisce il vivente è la chiusura organizzativa, non la sostanza di cui è fatto.", ex:["Maturana","Varela"],
   im:"Che il criterio del vivente sia la chiusura organizzativa.", co:"Casi limite difficili: virus, protocelle, sistemi artificiali autoreplicanti."},
  {id:"e", l:"Vita come relazione", f:"vivente = f(organismo, ambiente)", b:"Il vivente non si separa dal proprio ambiente, dalla propria storia e dalle reti ecologiche.", ex:["ecologia","niche construction"],
   im:"Che l'unità di analisi sia organismo più ambiente.", co:"Se il confine sfuma, che cosa stai studiando esattamente?"}
 ]},
{id:"q20", c:"v", t:"Le specie sono fisse?", f:"specie → fisse | in trasformazione",
 note:"",
 g:"È l'unica riga della matrice in cui la ricerca empirica ha di fatto chiuso la questione, e infatti la terza colonna resta vuota. Il punto filosoficamente vivo non è più se, ma che cosa ne segue: se le specie hanno una storia non hanno essenze, e l'uomo non ha uno statuto biologico separato. Le conseguenze cadono sulle domande 28 e 37.",
 an:"Non un enum fisso ma un albero di versioni con branch e merge: la categoria è un taglio che facciamo noi su una continuità.",
 o:[
  {id:"a", l:"Fissismo", f:"forma stabile e immutabile", b:"Ogni specie possiede una forma data una volta per tutte.", ex:[],
   im:"Tipi naturali stabili con confini netti.", co:"Contraddetto da fossili, genetica delle popolazioni e speciazione osservata."},
  {id:"b", l:"Evoluzionismo", f:"variazione + ereditarietà + selezione → evoluzione", b:"Le specie hanno una storia e derivano da trasformazioni di popolazioni precedenti. L'uomo rientra nella continuità del vivente.", ex:["Darwin","sintesi moderna"],
   im:"Continuità fra l'uomo e il resto del vivente.", co:"Toglie fondamento biologico a ogni eccezionalità umana: se la vuoi, va rifondata altrove."}
 ]},

{id:"q21", c:"c", t:"La mente coincide con il cervello?", f:"M ? B",
 note:"",
 g:"Distingui due domande che vengono continuamente fuse: da che cosa dipende la mente — quasi tutti oggi rispondono dal cervello — e a che cosa si riduce la sua descrizione. Sono indipendenti. Nota anche che il funzionalismo è la posizione che rende sensata l'intelligenza artificiale, mentre l'identità stretta la renderebbe impossibile in linea di principio.",
 an:"Un programma non è i transistor, e non gira senza. Identità significa confondere i livelli; funzionalismo significa astrarre l'interfaccia dal supporto; cognizione estesa significa contare anche disco e rete come parte del processo.",
 o:[
  {id:"a", l:"Identità", f:"M = B", b:"Gli stati mentali sono stati cerebrali, descritti in un altro vocabolario.", ex:[],
   im:"Che « mentale » sia solo un altro vocabolario per il fisico.", co:"Lega la mente a un substrato specifico, escludendo altre realizzazioni possibili."},
  {id:"b", l:"Dualismo", f:"M ≠ B", b:"Mente o anima appartengono a un ordine non completamente fisico.", ex:["Cartesio"],
   im:"Un ordine non fisico accanto a quello fisico.", co:"Come interagiscono? È la difficoltà che nessun dualismo ha mai risolto."},
  {id:"c", l:"Emergentismo", f:"M = f(B), M ⊄ descrizione dei neuroni", b:"La mente dipende dal cervello ma non si riduce alla somma delle sue parti.", ex:[],
   im:"Dipendenza senza riduzione.", co:"La parola emergenza nomina il problema più di quanto lo risolva."},
  {id:"d", l:"Funzionalismo", f:"M = organizzazione funzionale", b:"Conta il ruolo causale, non il materiale: la stessa mente potrebbe realizzarsi su substrati diversi.", ex:["scienze cognitive"],
   im:"Che conti il ruolo causale, non il materiale.", co:"Sembra lasciar fuori proprio l'esperienza in prima persona."},
  {id:"e", l:"Cognizione incarnata o estesa", f:"M = f(B, corpo, azione, ambiente)", b:"La mente non finisce dove finisce il cranio: strumenti, corpo e ambiente sono parte del processo.", ex:["Clark","Varela"],
   im:"Che i confini della mente non coincidano col cranio.", co:"Se si estende troppo, il concetto perde potere discriminante."}
 ]},
{id:"q22", c:"c", t:"La coscienza deriva dalla materia?", f:"materia ⇄ coscienza",
 note:"",
 g:"La difficoltà qui non è spiegare le funzioni cognitive, che sappiamo studiare, ma perché ci sia un'esperienza in prima persona che le accompagna. Ogni opzione paga un prezzo preciso: il fisicalismo deve dire perché l'elaborazione produca un vissuto; il panpsichismo deve dire come le esperienze elementari si combinino nella tua.",
 an:"Puoi tracciare ogni chiamata di un sistema senza che un solo log ti dica com'è essere quel sistema mentre gira. La domanda non è che cosa fa: è se c'è qualcuno dentro.",
 o:[
  {id:"a", l:"Fisicalismo o emergentismo", f:"materia organizzata → coscienza", b:"La coscienza compare a un certo grado di complessità organizzativa.", ex:[],
   im:"Che la coscienza appaia oltre una soglia di complessità.", co:"Nessuno sa dire quale soglia, né perché una soglia debba produrre vissuto."},
  {id:"b", l:"Idealismo della coscienza", f:"coscienza → materia conosciuta", b:"La materia è ciò che appare alla coscienza, non il contrario.", ex:[],
   im:"Che il dato primo sia l'esperienza.", co:"Difficile spiegare la stabilità intersoggettiva del mondo fisico."},
  {id:"c", l:"Panpsichismo o doppio aspetto", f:"realtà fondamentale → aspetto fisico + aspetto mentale", b:"Il mentale non emerge: è un aspetto originario del reale.", ex:["Spinoza","Whitehead","panpsichismo contemporaneo"],
   im:"Che il mentale non emerga ma sia originario.", co:"Il problema della combinazione: come fanno micro-esperienze a comporre la tua?"},
  {id:"d", l:"Spiritualismo o dualismo", f:"coscienza → principio spirituale", b:"La coscienza rinvia a un principio di ordine diverso dal fisico.", ex:[],
   im:"Un principio di ordine diverso.", co:"Torna intatto il problema dell'interazione."},
  {id:"e", l:"Agnosticismo", f:"?", b:"Non sappiamo ancora come sorga l'esperienza cosciente, e forse ci mancano i concetti adatti.", ex:["mysterianism"],
   im:"Che possa mancarci il concetto giusto, non solo il dato.", co:"Non è una spiegazione: è un promemoria onesto."}
 ]},
{id:"q23", c:"c", t:"Esiste un'anima?", f:"uomo = corpo + ?",
 note:"",
 g:"Prima di rispondere scegli il significato, o discuterai di tre cose diverse: sostanza separabile, forma organizzativa del corpo, oppure centro morale. Nella seconda accezione, quella aristotelica, molti materialisti contemporanei potrebbero accettare il termine senza cambiare idea su nulla: qui la disputa è spesso lessicale prima che ontologica.",
 an:"Un processo separabile che sopravvive alla macchina, oppure l'organizzazione stessa della macchina. La seconda non richiede nulla in più della macchina, e non le sopravvive.",
 o:[
  {id:"a", l:"Esiste", f:"uomo = corpo + anima", b:"Come sostanza separabile, come forma e principio organizzativo del corpo, come centro morale e spirituale, oppure come partecipazione a un'anima universale.", ex:["Platone","Aristotele","Tommaso d'Aquino"],
   im:"Un principio di identità che non coincide col corpo.", co:"Nessuna evidenza indipendente; e se è forma del corpo, non sopravvive al corpo."},
  {id:"b", l:"Non esiste", f:"uomo = organismo biologico e storico", b:"Ciò che chiamiamo anima si spiega con cervello, memoria, identità, linguaggio, relazioni e cultura.", ex:[],
   im:"Che identità e interiorità siano prodotti biologici e culturali.", co:"Devi rendere conto dell'unità dell'esperienza senza postulare un centro."},
  {id:"c", l:"Non sappiamo", f:"nessun criterio condiviso di verifica", b:"Manca un criterio universalmente accettato per verificare o falsificare l'esistenza dell'anima.", ex:[],
   im:"Che manchi un criterio condiviso di decisione.", co:"L'assenza di criterio non è neutra: nella pratica si finisce per vivere come se una risposta fosse vera."}
 ]},
{id:"q24", c:"c", t:"L'io è permanente?", f:"io → sostanza | processo | ∅",
 note:"",
 g:"Non è una curiosità orientale: Hume arriva alla stessa conclusione per via introspettiva, osservando che quando cerca l'io trova sempre e solo percezioni, mai il percipiente. La domanda ha effetti pratici immediati su responsabilità, promesse, terapia e su come tratti i tuoi stati mentali quando ti identifichi con essi.",
 an:"Identità per riferimento contro identità per continuità di stato: la nave di Teseo con un puntatore stabile, oppure senza.",
 o:[
  {id:"a", l:"Io sostanziale", f:"∃ soggetto che permane", b:"Un soggetto identico a se stesso attraverso tutti i cambiamenti.", ex:["Cartesio"],
   im:"Un soggetto identico nel tempo, portatore della responsabilità.", co:"Introspettivamente non lo trovi: trovi contenuti, mai il contenitore."},
  {id:"b", l:"Io processuale", f:"io = continuità di memoria, corpo, carattere, relazioni", b:"L'identità è una continuità costruita, non un nucleo dato in partenza.", ex:[],
   im:"Identità come continuità graduale e costruita.", co:"Ammette casi indecidibili: quanta discontinuità serve per rompere l'identità?"},
  {id:"c", l:"Assenza di io permanente", f:"persona = flusso di processi interdipendenti", b:"Non c'è un sé stabile da trovare: solo aggregati in relazione.", ex:["Hume","buddhismo","neuroscienze","filosofie processuali"],
   im:"Che l'io sia una costruzione utile ma non un'entità.", co:"Chi è allora il soggetto della responsabilità, della promessa e del cambiamento?"}
 ]},

{id:"q25", c:"u", t:"L'uomo è libero?", f:"scelta → ?",
 note:"",
 g:"La mossa decisiva è chiedersi che cosa intendi per libero: poter fare altrimenti a parità esatta di condizioni, oppure agire dalle proprie ragioni senza costrizione. Con la prima definizione il determinismo esclude la libertà; con la seconda no. Buona parte del dibattito millenario è, a rigore, una disputa sulla definizione.",
 an:"Chiedersi se un processo sia libero mentre esegue esattamente le sue istruzioni. Dipende se libero significa non deterministico oppure non interrotto dall'esterno.",
 o:[
  {id:"a", l:"Libertarismo", f:"∃ alternative realmente aperte", b:"Il soggetto può scegliere fra possibilità genuinamente alternative.", ex:[],
   im:"Che nella stessa identica situazione avresti potuto agire diversamente.", co:"Difficile da conciliare con la chiusura causale del mondo fisico."},
  {id:"b", l:"Determinismo", f:"scelta ⇐ cause", b:"Ogni scelta deriva da biologia, carattere, ambiente, storia, inconscio e condizioni sociali.", ex:[],
   im:"Che la responsabilità vada ripensata da capo.", co:"Nella pratica nessuno riesce a vivere e a giudicare senza presupporre scelte reali."},
  {id:"c", l:"Compatibilismo", f:"libertà = azione da motivazioni proprie senza coercizione", b:"La libertà non richiede assenza di cause, ma assenza di costrizione esterna.", ex:["Hume","Spinoza","Dennett"],
   im:"Libertà come assenza di coercizione, non di cause.", co:"Accusa classica: hai salvato la parola cambiandone il significato."}
 ]},
{id:"q26", c:"u", t:"L'uomo è razionale?", f:"uomo = animale + λόγος ?",
 note:"",
 g:"Psicologia e neuroscienze hanno spostato il baricentro: le emozioni non disturbano la decisione, la rendono possibile — chi perde l'accesso emotivo perde la capacità di scegliere, non la logica. Ma il passo dal « la ragione non è sola » al « la ragione è solo una maschera » è un salto ulteriore, e va argomentato a parte.",
 an:"Il segnale emotivo non è rumore: è il sistema di priorità che decide quale ramo esplorare. Senza, non hai razionalità pura: hai stallo.",
 o:[
  {id:"a", l:"Animale razionale", f:"uomo = animale + logos", b:"La ragione è ciò che definisce la specificità umana.", ex:["Aristotele"],
   im:"Una specificità umana fondata sul logos.", co:"Sottovaluta quanto poco razionalmente decidiamo di fatto."},
  {id:"b", l:"Ragione e passioni cooperano", f:"decisione = f(ragione, emozione)", b:"Le emozioni orientano attenzione, decisioni e valori: non sono un disturbo del pensiero.", ex:["Hume","Damasio"],
   im:"Un modello integrato della decisione.", co:"Rischia di essere una posizione di compromesso poco impegnativa."},
  {id:"c", l:"L'irrazionale precede la ragione", f:"ragione ⊂ forze non razionali", b:"Volontà, pulsione, inconscio e archetipi vengono prima e usano la ragione come strumento.", ex:["Schopenhauer","Nietzsche","Freud","Jung"],
   im:"Che le ragioni siano spesso razionalizzazioni a posteriori.", co:"Se la ragione è solo effetto, quale statuto ha questa stessa tesi?"}
 ]},
{id:"q27", c:"u", t:"L'uomo è individuo o relazione?", f:"io ? noi",
 note:"",
 g:"Non è solo antropologia: è la premessa nascosta di ogni discorso politico. Se l'individuo precede la comunità, i diritti sono anteriori allo Stato e lo Stato li riconosce; se l'identità nasce nella relazione, l'appartenenza non è una scelta secondaria ma la condizione stessa dell'io. Guarda dove ti porta, poi confronta con la domanda 35.",
 an:"Un oggetto con stato proprio che poi entra in rete, oppure un nodo la cui identità è definita dalle connessioni. Cambia completamente che cosa significhi isolarlo.",
 o:[
  {id:"a", l:"Individualismo", f:"individuo ≺ società", b:"L'individuo precede la società e possiede identità e diritti prima delle relazioni sociali.", ex:["Locke","liberalismo classico"],
   im:"Diritti e identità anteriori al legame sociale.", co:"Nessun individuo si è mai costituito fuori da una lingua e da una comunità."},
  {id:"b", l:"Relazionalismo", f:"io = f(tu, noi, comunità)", b:"L'identità si costituisce nella relazione: il soggetto è un effetto del legame, non il suo presupposto.", ex:["Hegel","Buber","Levinas","Ubuntu","confucianesimo","personalismo"],
   im:"Che il soggetto sia un effetto della relazione.", co:"Rischia di dissolvere la possibilità di criticare la comunità dall'interno."}
 ]},
{id:"q28", c:"u", t:"L'uomo ha una natura fissa?", f:"essenza ? esistenza",
 note:"",
 g:"Attenzione al termine di mezzo: dire che la natura umana è evolutiva non significa dire che sia arbitraria. Vincoli profondi e plasticità convivono benissimo. La domanda operativa, e scomoda, è quanto di ciò che chiami natura sia in realtà storia recente — e il criterio per distinguerle non è ovvio.",
 an:"Schema fisso, schema con migrazioni, oppure nessuno schema e solo i dati che ci scrivi. Il secondo caso è quello reale: il vincolo c'è, ma ha una versione.",
 o:[
  {id:"a", l:"Essenza stabile", f:"∃ natura umana universale", b:"L'essere umano possiede caratteristiche costanti attraverso epoche e culture.", ex:[],
   im:"Criteri universali per giudicare culture e istituzioni.", co:"Storicamente, ciò che si dichiarava naturale si è spesso rivelato locale."},
  {id:"b", l:"Natura evolutiva", f:"natura = esito di evoluzione biologica e culturale", b:"Ciò che chiamiamo natura umana è una storia sedimentata, non un dato eterno.", ex:[],
   im:"Vincoli reali ma datati, e quindi modificabili.", co:"Serve un criterio per distinguere il vincolo profondo dalla contingenza recente."},
  {id:"c", l:"Nessuna essenza prefissata", f:"esistenza → costruzione dell'essenza", b:"L'uomo è ciò che fa di sé: l'essenza viene dopo, non prima.", ex:["Sartre"],
   im:"Piena responsabilità e nessun alibi.", co:"Ignora vincoli biologici e psicologici ampiamente documentati."}
 ]},

{id:"q29", c:"k", t:"Il significato è nel mondo o lo produce l'uomo?", f:"significato → trovato | costruito | assente",
 note:"",
 g:"Il terzo caso va letto bene, perché viene quasi sempre frainteso: dire che il mondo non contiene significato non implica che nulla abbia senso. Implica che il senso sia un'attività e non un ritrovamento, e quindi che sia revocabile e vada mantenuto attivamente. È una posizione più impegnativa, non più comoda.",
 an:"Metadati già presenti nel dato, oppure aggiunti dal parser. Nel secondo caso l'informazione è reale, ma esiste solo nella relazione fra dato e interprete.",
 o:[
  {id:"a", l:"Significato oggettivo", f:"significato ∈ mondo", b:"Deriva da Dio, ordine cosmico, natura, finalità, archetipi, legge morale o storia dello Spirito.", ex:[],
   im:"Che ci sia un senso da scoprire, e quindi da poter sbagliare.", co:"Come lo verifichi, se ogni accesso passa da un'interpretazione?"},
  {id:"b", l:"Significato costruito", f:"significato = f(mondo, linguaggio, cultura, interprete)", b:"Il senso nasce nell'interpretazione: è reale ma non preesistente.", ex:["ermeneutica","costruttivismo"],
   im:"Che il senso sia reale ma generato nella relazione.", co:"Scivola verso il relativismo: ogni interpretazione vale quanto le altre?"},
  {id:"c", l:"Nessun significato intrinseco", f:"significato ∉ mondo", b:"Il mondo è muto: il significato è creazione umana, e questo è insieme il peso e la libertà.", ex:["esistenzialismo","nichilismo","umanesimo secolare"],
   im:"Che il senso sia interamente un tuo compito.", co:"Peso considerevole, e nessuna garanzia che regga nelle situazioni estreme."}
 ]},
{id:"q30", c:"k", t:"La verità è assoluta?", f:"verità → ?",
 note:"",
 g:"Il fallibilismo è la posizione operativa di fatto della scienza, e conviene distinguerlo con cura dal relativismo: dire che ogni conoscenza è correggibile non è dire che ogni opinione valga uguale. Il primo mantiene intatta la nozione di errore; il secondo la perde, e con essa la possibilità di imparare qualcosa.",
 an:"Il test può fallire domani: questo non significa che non esista un comportamento corretto. Fallibilismo è avere test; relativismo è non avere asserzioni.",
 o:[
  {id:"a", l:"Assolutismo", f:"∃ verità indipendenti da epoca e osservatore", b:"Alcune verità valgono a prescindere da cultura, utilità e punto di vista.", ex:[],
   im:"Verità indipendenti dal punto di vista.", co:"Ogni accesso alla verità resta comunque situato in un linguaggio e in un'epoca."},
  {id:"b", l:"Relativismo e prospettivismo", f:"verità = f(cultura, linguaggio, paradigma, posizione)", b:"Ogni verità è detta da qualche luogo e in qualche lingua.", ex:["Nietzsche","Kuhn"],
   im:"Che ogni criterio sia interno a un contesto.", co:"L'autocontraddizione classica: vale relativamente anche questa affermazione?"},
  {id:"c", l:"Fallibilismo", f:"∃ verità ∧ ∀ conoscenza correggibile", b:"La verità esiste, ma ogni nostra conoscenza resta rivedibile.", ex:["Peirce","Popper"],

  {id:"d", l:"Scetticismo", f:"sospensione del giudizio", b:"Non possiamo raggiungere una verità certa: può essere razionale non decidere.", ex:["Pirrone","Sesto Empirico"],

const S = { view:"tree", q:"q1", ans:{}, filter:"" };
const byId = id => Q.find(x => x.id === id);
const el = (t,c,h) => { const n=document.createElement(t); if(c)n.className=c; if(h!=null)n.innerHTML=h; return n; };
const esc = s => String(s).replace(/[&<>]/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[m]));

/* ══════════ vettore w (elemento firma) ══════════ */
function buildVector(){
  const v = document.getElementById("vec");
  v.innerHTML = "";
  v.appendChild(el("span","paren mono","⟨"));
  CLUSTERS.forEach(cl => {
    const tot = Q.filter(q => q.c === cl.id).length;
    const got = Q.filter(q => q.c === cl.id && S.ans[q.id]).length;
    const b = el("button","coord");
    b.dataset.on = got > 0 ? "1" : "0";
    b.dataset.full = got === tot ? "1" : "0";
    b.innerHTML = '<span class="fill" style="height:' + Math.round(got/tot*100) + '%"></span><i>' + cl.id + '</i>'
      + '<span class="tip">' + esc(cl.name) + " · " + got + "/" + tot + "</span>";
    b.setAttribute("aria-label", cl.name + ", " + got + " di " + tot + " risposte");
    b.onclick = () => { S.view = "tree"; go(Q.find(q => q.c === cl.id).id); };
    v.appendChild(b);
  });
  v.appendChild(el("span","paren mono","⟩"));
}

/* ══════════ indice laterale ══════════ */
function buildNav(){
  const box = document.getElementById("navlist");
  box.innerHTML = "";
  const f = S.filter.toLowerCase().trim();
  CLUSTERS.forEach(cl => {
    const qs = Q.filter(q => q.c === cl.id && (!f || (q.t + " " + q.o.map(o => o.l + " " + o.b).join(" ")).toLowerCase().includes(f)));
    if(!qs.length) return;
    const g = el("div","grp");
    const tot = Q.filter(q => q.c === cl.id).length;
    const got = Q.filter(q => q.c === cl.id && S.ans[q.id]).length;
    g.appendChild(el("div","grp-h",
      '<span class="sym">' + cl.id + '</span><em>' + esc(cl.name) + '</em><small>' + got + "/" + tot + "</small>"));
    qs.forEach(q => {
      const b = el("button","qlink",
        '<span class="num">' + (Q.indexOf(q)+1) + '</span><span>' + esc(q.t) + '</span><span class="dot"></span>');
      b.dataset.answered = S.ans[q.id] ? "1" : "0";
      if(S.view === "tree" && S.q === q.id) b.setAttribute("aria-current","true");
      b.onclick = () => { S.view = "tree"; go(q.id); document.getElementById("nav").dataset.open = "0"; };
      g.appendChild(b);
    });
    box.appendChild(g);
  });
  if(!box.children.length) box.appendChild(el("p","",'<span style="color:var(--dimmer);font-size:14px;padding:0 10px">Nessuna domanda corrisponde.</span>'));
}

/* ══════════ vista albero ══════════ */
function renderTree(){
  const q = byId(S.q), i = Q.indexOf(q), cl = CLUSTERS.find(c => c.id === q.c);
  const m = document.getElementById("main");
  m.innerHTML = "";

  m.appendChild(el("div","eyebrow",
    '<span class="sym" style="width:20px;height:20px;font-size:10px">' + cl.id + '</span>'
    + esc(cl.name) + '<span class="sep"></span><b>domanda ' + (i+1) + '</b> di ' + Q.length
    + '<span class="sep"></span>' + esc(cl.gloss)));

  const h = el("div","qhead");
  h.appendChild(el("div","qnum", String(i+1).padStart(2,"0")));
  h.appendChild(el("h1","qtitle", esc(q.t)));
  m.appendChild(h);

  if(q.f) m.appendChild(el("div","formula mono", esc(q.f)));
  if(q.note) m.appendChild(el("p","qnote", esc(q.note)));
  else m.appendChild(el("div","",'<div style="height:22px"></div>'));

  if(q.g){
    const g = el("div","guide");
    g.appendChild(el("span","gl","come orientarsi"));
    g.appendChild(el("p","", esc(q.g)));
    if(q.an) g.appendChild(el("div","an",'<b>analogia</b><i>' + esc(q.an) + '</i>'));
    m.appendChild(g);
  }

  const wrap = el("div","branches");
  wrap.dataset.any = S.ans[q.id] ? "1" : "0";
  q.o.forEach((o,k) => {
    const c = el("div","branch");
    c.style.setProperty("--bc","var(" + HUE[k % HUE.length] + ")");
    if(S.ans[q.id] === o.id) c.dataset.picked = "1";
    const top = el("div","b-top");
    top.appendChild(el("span","b-key mono", o.id.toUpperCase()));
    top.appendChild(el("span","b-label", esc(o.l)));
    const pick = el("button","b-pick", S.ans[q.id] === o.id ? "scelta" : "scegli");
    pick.onclick = () => {
      if(S.ans[q.id] === o.id) delete S.ans[q.id]; else S.ans[q.id] = o.id;
      render();
    };
    top.appendChild(pick);
    c.appendChild(top);
    if(o.f) c.appendChild(el("p","b-f mono", esc(o.f)));
    c.appendChild(el("p","b-body", esc(o.b)));
    if(o.ex && o.ex.length){
      const ch = el("div","chips");
      o.ex.forEach(e => ch.appendChild(el("span","chip mono", esc(e))));
      c.appendChild(ch);
    }
    if(o.im || o.co){
      const ix = el("div","b-imp");
      if(o.im) ix.appendChild(el("div","im",'<b>implica</b><span>' + esc(o.im) + '</span>'));
      if(o.co) ix.appendChild(el("div","co",'<b>costo</b><span>' + esc(o.co) + '</span>'));
      c.appendChild(ix);
    }
    wrap.appendChild(c);
  });
  m.appendChild(wrap);

  const p = el("div","pager");
  const prev = el("button","pv", i > 0
    ? '<small>← precedente</small><span>' + esc(Q[i-1].t) + '</span>'
    : '<small>inizio</small><span>—</span>');
  prev.disabled = i === 0; prev.onclick = () => go(Q[i-1].id);
  const next = el("button","nx", i < Q.length-1
    ? '<small>successiva →</small><span>' + esc(Q[i+1].t) + '</span>'
    : '<small>fine</small><span>—</span>');
  next.disabled = i === Q.length-1; next.onclick = () => go(Q[i+1].id);
  p.append(prev,next); m.appendChild(p);

  m.appendChild(affinity());
}

/* ══════════ affinità con i profili ══════════ */
function affinity(){
  const n = Object.keys(S.ans).length;
  const box = el("div","aff");
  const hh = el("div","aff-h");
  hh.appendChild(el("h2","","Il tuo profilo"));
  const rst = el("button","","azzera le scelte");
  rst.onclick = () => { S.ans = {}; render(); };
  hh.appendChild(rst);
  box.appendChild(hh);
  box.appendChild(el("p","", n === 0
    ? "Scegli un ramo in qualunque domanda: qui compare quanto le tue risposte coincidono con otto profili classici, calcolato solo sulle domande a cui hai risposto e per cui il profilo ha una posizione riconoscibile. Le attribuzioni sono indicative, non filologiche."
    : "Coincidenza sulle " + n + (n === 1 ? " risposta data" : " risposte date") + ", limitata alle domande in cui il profilo prende posizione. Attribuzioni indicative."));

  const rows = PROFILES.map(p => {
    let hit = 0, cmp = 0;
    for(const qid in S.ans){ if(p.m[qid]){ cmp++; if(p.m[qid] === S.ans[qid]) hit++; } }
    return {n:p.n, pct: cmp ? Math.round(hit/cmp*100) : 0, cmp, hit};
  }).sort((a,b) => b.pct - a.pct || b.cmp - a.cmp);

  const bars = el("div","bars");
  rows.forEach(r => {
    const b = el("div","bar");
    b.appendChild(el("div","bar-n", esc(r.n)));
    const t = el("div","bar-t"); const f = el("div","bar-f");
    t.appendChild(f); b.appendChild(t);
    b.appendChild(el("div","bar-v mono", r.cmp ? r.pct + "%" : "—"));
    bars.appendChild(b);
    requestAnimationFrame(() => { f.style.width = (r.cmp ? r.pct : 0) + "%"; });
  });
  box.appendChild(bars);
  return box;
}

/* ══════════ vista matrice ══════════ */
function renderMatrix(){
  const m = document.getElementById("main");
  m.innerHTML = "";
  m.appendChild(el("div","eyebrow","§ 29 <span class='sep'></span> le grandi biforcazioni"));
  m.appendChild(el("h2","vh","Matrice minima"));
  m.appendChild(el("p","lead","Ventidue domande ridotte all'osso, con la terza uscita sempre in vista. <strong>Le celle evidenziate sono le tue scelte</strong>: clicca il testo di una domanda per aprirla nell'albero."));
  const w = el("div","wrap-t");
  const tb = el("table");
  tb.innerHTML = "<thead><tr><th>Domanda</th><th>Risposta A</th><th>Risposta B</th><th>Terza possibilità</th></tr></thead>";
  const body = el("tbody");
  MATRIX.forEach(([qid,a,b,c]) => {
    const q = byId(qid), tr = el("tr");
    const td0 = el("td","q", esc(q.t));
    td0.onclick = () => { S.view = "tree"; setTab("tree"); go(qid); };
    tr.appendChild(td0);
    [a,b,c].forEach((lab,k) => {
      const oid = MCOL[qid][k];
      const td = el("td");
      const sp = el("span","cell", esc(lab));
      sp.style.setProperty("--cc","var(" + HUE[k] + ")");
      if(oid && S.ans[qid] === oid) sp.dataset.on = "1";
      td.appendChild(sp); tr.appendChild(td);
    });
    body.appendChild(tr);
  });
  tb.appendChild(body); w.appendChild(tb); m.appendChild(w);
}

/* ══════════ vista profili ══════════ */
function renderProfiles(){
  const m = document.getElementById("main");
  m.innerHTML = "";
  m.appendChild(el("div","eyebrow","§ 30 <span class='sep'></span> filosofia = combinazione coerente di risposte"));
  m.appendChild(el("h2","vh","Profili"));
  m.appendChild(el("p","lead","Ogni tradizione diventa un punto nello spazio delle alternative. <strong>Sovrapponi</strong> mostra dove il profilo e le tue scelte coincidono. Il limite del metodo resta quello dichiarato in conclusione: alcune tradizioni non scelgono fra A e ¬A, perché considerano la distinzione parziale o valida solo a un certo livello."));
  const g = el("div","cards");
  PROFILES.forEach(p => {
    const c = el("div","card");
    c.appendChild(el("h3","", esc(p.n)));
    c.appendChild(el("div","era", esc(p.era)));
    const ul = el("ul");
    const keys = Object.keys(p.m).slice(0,9);
    keys.forEach(qid => {
      const q = byId(qid), o = q.o.find(x => x.id === p.m[qid]);
      const same = S.ans[qid] === p.m[qid];
      ul.appendChild(el("li","", '<b>' + q.c + '</b><span style="color:' + (same ? "var(--gold)" : "var(--dim)") + '">'
        + esc(o.l) + '</span>'));
    });
    c.appendChild(ul);
    let hit = 0, cmp = 0;
    for(const qid in S.ans){ if(p.m[qid]){ cmp++; if(p.m[qid] === S.ans[qid]) hit++; } }
    c.appendChild(el("div","mt",
      '<span>' + Object.keys(p.m).length + ' posizioni</span><em>' + (cmp ? "coincidenza " + Math.round(hit/cmp*100) + "%" : "nessuna scelta") + '</em>'));
    g.appendChild(c);
  });
  m.appendChild(g);
}

/* ══════════ routing ══════════ */
function setTab(v){
  document.querySelectorAll(".tabs button").forEach(b => b.setAttribute("aria-selected", b.dataset.view === v ? "true" : "false"));
}
function go(id){ S.q = id; render(); document.querySelector("main").scrollIntoView({block:"start", behavior:"smooth"}); }
function render(){
  buildVector(); buildNav();
  if(S.view === "tree") renderTree();
  else if(S.view === "matrix") renderMatrix();
  else renderProfiles();
}

document.querySelectorAll(".tabs button").forEach(b => {
  b.onclick = () => { S.view = b.dataset.view; setTab(S.view); render(); };
});
document.getElementById("search").addEventListener("input", e => { S.filter = e.target.value; buildNav(); });
document.getElementById("ntg").onclick = () => {
  const n = document.getElementById("nav");
  n.dataset.open = n.dataset.open === "1" ? "0" : "1";
};
document.addEventListener("keydown", e => {
  if(e.target.tagName === "INPUT"){ if(e.key === "Escape") e.target.blur(); return; }
  if(e.key === "/"){ e.preventDefault(); document.getElementById("search").focus(); return; }
  if(S.view !== "tree") return;
  const i = Q.indexOf(byId(S.q));
  if(e.key === "ArrowRight" && i < Q.length-1) go(Q[i+1].id);
  if(e.key === "ArrowLeft" && i > 0) go(Q[i-1].id);
});

render();
</script>
</body>
</html>
